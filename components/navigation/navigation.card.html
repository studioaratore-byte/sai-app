<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: var(--surface-page); font-family: var(--font-sans); }
  #root { padding: 24px; display: flex; gap: 20px; flex-wrap: wrap; }
  .phone { width: 320px; background: var(--surface-card); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow-sm); }
  .lbl { font: var(--font-caption-2); color: var(--text-weak); letter-spacing: var(--tracking-normal); margin: 0 0 8px; width: 100%; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { NavigationBar, TopBar, Tab, Button } = window.TDSDesignSystem_58842e;

function Demo() {
  const [tab, setTab] = React.useState("all");
  const [range, setRange] = React.useState("주");
  return (
    <>
      <div>
        <p className="lbl">NavigationBar + TopBar</p>
        <div className="phone">
          <NavigationBar onBack={()=>{}} title="회의 만들기" titleVisible={false} right={<Button variant="ghost" size="sm">저장</Button>} />
          <TopBar title="언제 만날까요?" description="싫은 시간만 지우면, 사이가 좋은 시간을 찾아드려요." />
        </div>
      </div>
      <div>
        <p className="lbl">Tab — underline / capsule</p>
        <div className="phone" style={{ padding: 16 }}>
          <Tab items={[{value:"all",label:"전체"},{value:"mine",label:"내 회의"},{value:"done",label:"지난 회의"}]} value={tab} onChange={setTab} />
          <div style={{ height: 16 }} />
          <Tab variant="capsule" items={["주","월"]} value={range} onChange={setRange} />
        </div>
      </div>
    </>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
