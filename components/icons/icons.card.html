<!-- @dsCard group="Components" viewport="700x340" name="Icons" subtitle="Toss-style line set — 30 glyphs, 24×24, rounded strokes" -->
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="../../styles.css" />
<style>
  html, body { margin: 0; background: var(--surface-card); font-family: var(--font-sans); }
  #root { padding: 24px; }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 10px; max-width: 660px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 12px 4px; border-radius: var(--radius-md); background: var(--surface-sunken); color: var(--grey-800); }
  .nm { font: var(--font-caption-2); font-size: 10px; color: var(--text-weak); letter-spacing: var(--tracking-normal); }
  .tint { display: flex; gap: 10px; margin-bottom: 18px; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Icon, ICON_NAMES, Asset } = window.TDSDesignSystem_58842e;

function Demo() {
  return (
    <div>
      <div className="tint">
        <Asset tone="primary"><Icon name="calendar" color="var(--primary)" /></Asset>
        <Asset tone="warning"><Icon name="coffee" color="#B77900" /></Asset>
        <Asset tone="positive"><Icon name="check-circle" color="var(--green-600)" /></Asset>
        <Asset tone="negative"><Icon name="briefcase" color="var(--red-600)" /></Asset>
        <Asset tone="neutral"><Icon name="lock" color="var(--grey-700)" /></Asset>
      </div>
      <div className="grid">
        {ICON_NAMES.map((n) => (
          <div className="cell" key={n}>
            <Icon name={n} size={26} />
            <span className="nm">{n}</span>
          </div>
        ))}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Demo />);
</script>
</body>
</html>
